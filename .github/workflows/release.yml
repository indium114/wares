name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'

      - name: Build binary
        run: go build -v ./...

      - name: Create release
        uses: softprops/action-gh-release@latest
        with:
          files: wares
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
